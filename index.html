<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kawaii Pixel Links</title>

  <style>
    :root {
      --bg: #fbeaf3;
      --bg2: #f7dcea;
      --card: #fff6fb;
      --text: #6d4c67;
      --pink1: #ffd2e7;
      --pink2: #ffb8d5;
      --pink3: #f78fbc;
      --lav: #e4d6ff;
      --blue: #d7efff;
      --cream: #fff1c7;
      --line: #c97aa0;
      --line-dark: #9d5b7b;
      --white: #ffffff;
      --shadow: #efbdd5;
    }

    * {
      box-sizing: border-box;
    }

    html {
      image-rendering: pixelated;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Verdana", "Trebuchet MS", sans-serif;
      color: var(--text);
      background:
        linear-gradient(rgba(251, 234, 243, 0.78), rgba(247, 220, 234, 0.78)),
        url("https://github.com/himepop/webwebcute/blob/main/bg-pattern.png?raw=true");
      background-repeat: no-repeat, repeat;
      background-size: cover, 220px;
      background-position: center, top left;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .site-card {
      width: 100%;
      max-width: 430px;
      position: relative;
      background: var(--card);
      border: 4px solid var(--line);
      border-radius: 0;
      padding: 24px 18px 18px;
      text-align: center;
      box-shadow:
        8px 8px 0 0 var(--shadow),
        0 0 0 4px #fff;
    }

    .site-card::before {
      content: "";
      position: absolute;
      inset: 8px;
      border: 2px dashed #f0b8d0;
      pointer-events: none;
    }

    .sticker {
      position: absolute;
      width: 58px;
      height: 58px;
      object-fit: contain;
      image-rendering: pixelated;
      pointer-events: none;
    }

    .sticker.s1 { top: -22px; left: -10px; }
    .sticker.s2 { top: -20px; right: -10px; }
    .sticker.s3 { bottom: -18px; left: -12px; }
    .sticker.s4 { bottom: -20px; right: -8px; }

    .top-badge {
      display: inline-block;
      padding: 6px 10px;
      margin-bottom: 14px;
      background: var(--cream);
      border: 3px solid var(--line);
      border-radius: 0;
      font-size: 12px;
      font-weight: 700;
      text-transform: lowercase;
      box-shadow: 4px 4px 0 0 #f0dca2;
    }

    .avatar-wrap {
      width: 124px;
      height: 124px;
      margin: 0 auto 14px;
      padding: 6px;
      background: var(--pink2);
      border: 4px solid var(--line);
      border-radius: 0;
      box-shadow: 6px 6px 0 0 #f2bfd7;
    }

    .avatar {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border: 3px solid #fff;
      border-radius: 0;
      image-rendering: pixelated;
      background: #fff;
    }

    h1 {
      margin: 6px 0 8px;
      font-size: 26px;
      line-height: 1.1;
      letter-spacing: 0.5px;
      text-shadow: 2px 2px 0 #ffe3ef;
    }

    .tagline {
      margin: 0 auto 16px;
      max-width: 300px;
      font-size: 13px;
      line-height: 1.6;
      background: #fff;
      border: 2px solid #efc2d7;
      padding: 10px;
    }

    .mini-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .pill {
      background: #fff;
      border: 3px solid #efc2d7;
      border-radius: 0;
      padding: 6px 8px;
      font-size: 11px;
      font-weight: 700;
      box-shadow: 3px 3px 0 0 #f7d9e7;
    }

    .links {
      display: grid;
      gap: 12px;
      margin-top: 4px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
      font-weight: 800;
      font-size: 14px;
      padding: 14px 14px;
      border: 3px solid var(--line);
      border-radius: 0;
      position: relative;
      box-shadow: 5px 5px 0 0 rgba(201, 122, 160, 0.22);
      transition: transform 0.08s steps(2), box-shadow 0.08s steps(2);
      text-transform: lowercase;
    }

    .link-btn:hover {
      transform: translate(-1px, -1px);
      box-shadow: 7px 7px 0 0 rgba(201, 122, 160, 0.22);
    }

    .link-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 0 rgba(201, 122, 160, 0.22);
    }

    .link-btn span:first-child {
      font-size: 16px;
    }

    .pink  { background: linear-gradient(180deg, var(--pink1), var(--pink2)); }
    .lav   { background: linear-gradient(180deg, #efe7ff, #ddd0ff); }
    .blue  { background: linear-gradient(180deg, #e6f7ff, #cdeeff); }
    .cream { background: linear-gradient(180deg, #fff8de, #ffefbd); }

    .gif-row {
      margin-top: 18px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .gif-row img {
      width: 56px;
      height: 56px;
      object-fit: contain;
      image-rendering: pixelated;
      background: #fff;
      border: 3px solid #efc2d7;
      border-radius: 0;
      padding: 4px;
      box-shadow: 4px 4px 0 0 #f6d7e6;
    }

    .footer {
      margin-top: 18px;
      font-size: 12px;
      line-height: 1.5;
      background: #fffdfd;
      border: 2px solid #efc2d7;
      padding: 8px 10px;
    }

    .credit {
      margin-top: 8px;
      font-size: 10px;
      opacity: 0.8;
    }

    .pixel-divider {
      width: 100%;
      height: 8px;
      margin: 16px 0 14px;
      background:
        repeating-linear-gradient(
          90deg,
          #ffd2e7 0 16px,
          #fff 16px 24px,
          #e4d6ff 24px 40px,
          #fff1c7 40px 48px
        );
      border: 2px solid #efc2d7;
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
      }

      .site-card {
        padding: 20px 14px 16px;
      }

      h1 {
        font-size: 22px;
      }

      .tagline {
        font-size: 12px;
      }

      .link-btn {
        font-size: 13px;
        padding: 13px 12px;
      }

      .sticker {
        width: 48px;
        height: 48px;
      }
    }
  </style>
</head>
<body>
  <main class="site-card">
    <img class="sticker s1" src="https://github.com/himepop/webwebcute/blob/main/sticker-bow.png" alt="">
    <img class="sticker s2" src="https://github.com/himepop/webwebcute/blob/main/star-icon.png" alt="">
    <img class="sticker s3" src="https://github.com/himepop/webwebcute/blob/main/star-icon.png" alt="">
    <img class="sticker s4" src="https://github.com/himepop/webwebcute/blob/main/sticker-bow.png" alt="">

    <div class="top-badge">welcome to my pixel corner ♡</div>

    <div class="avatar-wrap">
      <img class="avatar" src="https://github.com/himepop/webwebcute/blob/main/IMG_8787.PNG" alt="Profile picture" />
    </div>

    <h1>peachy angel</h1>

    <p class="tagline">
      artist, dreamer, pastel collector, and tiny internet fairy ✨
    </p>

    <div class="mini-row">
      <div class="pill">૮ ˶ᵔ ᵕ ᵔ˶ ა</div>
      <div class="pill">kawaii mode: on</div>
      <div class="pill">pink cloud club</div>
    </div>

    <div class="pixel-divider"></div>

    <section class="links">
      <a class="link-btn pink" href="https://instagram.com" target="_blank">
        <span>🎀</span><span>instagram</span>
      </a>

      <a class="link-btn lav" href="https://tiktok.com" target="_blank">
        <span>🫧</span><span>tiktok</span>
      </a>

      <a class="link-btn blue" href="https://youtube.com" target="_blank">
        <span>☁️</span><span>youtube</span>
      </a>

      <a class="link-btn cream" href="https://ko-fi.com" target="_blank">
        <span>🧁</span><span>support me</span>
      </a>

      <a class="link-btn pink" href="https://example.com" target="_blank">
        <span>💌</span><span>commission info</span>
      </a>
    </section>

    <div class="pixel-divider"></div>

    <div class="gif-row">
      <img src="https://github.com/himepop/webwebcute/blob/main/bunny-mascot.png" alt="Cute mascot">
      <img src="https://github.com/himepop/webwebcute/blob/main/star-icon.png" alt="Star icon">
      <img src="https://github.com/himepop/webwebcute/blob/main/sticker-bow.png" alt="Bow sticker">
    </div>

    <div class="footer">made with love, pixels, and sparkles ♡</div>
    <div class="credit">replace the links and text with your own favorites</div>
  </main>
</body>
</html>
